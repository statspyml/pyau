name: Publish to PyPI

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necessário para o bump-my-version ler as tags

      - uses: astral-sh/setup-uv@v5

      - name: Install deps
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -v

      - name: Build
        run: |
          rm -rf dist/
          uv build

      - name: Publish
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}