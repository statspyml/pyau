name: Bug Report
description: Report a bug or unexpected behaviour in pyvulscan
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: pyvulscan version
      placeholder: "e.g. 0.1.6  (run: pip show pyvulscan)"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.2  (run: python --version)"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14.4, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: dropdown
    id: lockfile
    attributes:
      label: Dependency file type
      options:
        - uv.lock
        - poetry.lock
        - pyproject.toml
        - requirements.txt
        - multiscan config
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command you ran
      placeholder: "e.g. pyvulscan pyproject.toml --filter HIGH"
      render: bash
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened? Include the full output (stdout + stderr).
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other details, logs, or screenshots that might help.
